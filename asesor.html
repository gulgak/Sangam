// ===== GEMINI API CALL =====
async function callGemini({ images, prompt, model = 'gemini-2.5-flash', generateImage = false }) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('NO_API_KEY');
  
  const parts = [];
  if (images && images.length > 0) {
    for (const img of images) {
      parts.push({ inline_data: { mime_type: img.mediaType, data: img.data } });
    }
  }
  parts.push({ text: prompt });
  
  const body = { contents: [{ role: 'user', parts }] };
  if (generateImage) {
    body.generationConfig = { responseModalities: ['TEXT', 'IMAGE'] };
  }
  
  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
    body: JSON.stringify(body)
  });
  
  if (response.status === 401 || response.status === 403) throw new Error('BAD_API_KEY');
  if (response.status === 429) throw new Error('RATE_LIMIT');
  if (!response.ok) {
    const text = await response.text();
    throw new Error('API: ' + text.slice(0, 200));
  }
  
  const data = await response.json();
  
  // Check for blocked content
  if (data.promptFeedback?.blockReason) throw new Error('BLOCKED: ' + data.promptFeedback.blockReason);
  
  const result = { text: '', image: null };
  const candParts = data?.candidates?.[0]?.content?.parts || [];
  for (const part of candParts) {
    if (part.text) result.text += part.text;
    if (part.inlineData) {
      result.image = {
        data: part.inlineData.data,
        mediaType: part.inlineData.mimeType,
        dataUrl: `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`
      };
    }
  }
  
  return result;
}

// Helper that throws an error and parses to expected format
async function geminiText({ images, prompt, expectJson = false }) {
  const r = await callGemini({ images, prompt });
  if (expectJson) {
    let t = r.text.replace(/```json|```/g, '').trim();
    return JSON.parse(t);
  }
  return r.text;
}

async function geminiTryOn({ personImage, garmentImage }) {
  const r = await callGemini({ 
    images: [personImage, garmentImage], 
    prompt: TRYON_PROMPT, 
    model: 'gemini-2.5-flash-image', 
    generateImage: true 
  });
  if (!r.image) throw new Error('NO_IMAGE_RETURNED');
  return r.image;
}

async function resizeImage(file, maxSize = 700, quality = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSize) { height = (height * maxSize) / width; width = maxSize; }
        else if (height > maxSize) { width = (width * maxSize) / height; height = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve({ dataUrl, data: dataUrl.split(',')[1], mediaType: 'image/jpeg' });
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function errorMessage(e) {
  if (e.message === 'BAD_API_KEY') return T('API key inválida. Revísala en ajustes.', 'Invalid API key. Check it in settings.');
  if (e.message === 'RATE_LIMIT') return T('Has alcanzado el límite diario gratuito. Inténtalo mañana.', 'You have reached the free daily limit. Try again tomorrow.');
  if (e.message === 'NO_IMAGE_RETURNED') return T('No se pudo generar la imagen. Inténtalo de nuevo.', 'The image could not be generated. Try again.');
  if (e.message?.startsWith('BLOCKED:')) return T('Gemini bloqueó esta consulta por seguridad. Prueba con otra foto.', 'Gemini blocked this request for safety. Try another photo.');
  return 'Error: ' + (e.message || T('inténtalo de nuevo', 'try again'));
}

// ===== FORMATTED TEXT =====
function FormattedText({ text }) {
  const lines = text.split('\n').filter(l => l.trim());
  const renderInline = (s) => s.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#3a2820">$1</strong>');
  return (
    <div className="space-y-3 leading-relaxed">
      {lines.map((line, i) => {
        const numHead = line.match(/^\d+\.\s+\*\*(.+?)\*\*\s*[—:-]?\s*(.*)$/);
        if (numHead) return (
          <div key={i} className="mt-5 first:mt-0">
            <h3 className="font-display text-xl tracking-tight" style={{color:'#a8421f'}}>{numHead[1]}</h3>
            {numHead[2] && <p className="text-stone-700 mt-1" dangerouslySetInnerHTML={{__html: renderInline(numHead[2])}}/>}
          </div>
        );
        if (line.startsWith('**') && line.endsWith('**'))
          return <h3 key={i} className="font-display text-xl mt-5 tracking-tight" style={{color:'#a8421f'}}>{line.replace(/\*\*/g, '')}</h3>;
        if (line.match(/^[-•*]\s+/)) {
          const c = line.replace(/^[-•*]\s+/, '');
          return (
            <div key={i} className="flex gap-3 pl-1">
              <span className="mt-1.5 w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:'#a8421f'}}/>
              <span className="text-stone-700 flex-1" dangerouslySetInnerHTML={{__html: renderInline(c)}}/>
            </div>
          );
        }
        return <p key={i} className="text-stone-700" dangerouslySetInnerHTML={{__html: renderInline(line)}}/>;
      })}
    </div>
  );
}

// ===== PHOTO TAB =====
function PhotoTab({ promptText, iconName, placeholder, cameraMode = "environment" }) {
  const [image, setImage] = useState(null);
  const [imageData, setImageData] = useState(null);
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const fileRef = useRef(); const cameraRef = useRef();

  const handleFile = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setError(''); setResult('');
    const resized = await resizeImage(f, 900, 0.85);
    setImage(resized.dataUrl); setImageData(resized);
  };

  const analyze = async () => {
    if (!imageData) return;
    setLoading(true); setError('');
    try {
      const r = await geminiText({ images: [imageData], prompt: promptText });
      setResult(r);
    } catch (e) { setError(errorMessage(e)); }
    finally { setLoading(false); }
  };

  const reset = () => { setImage(null); setImageData(null); setResult(''); setError(''); };

  return (
    <div className="space-y-5">

          <div className="rounded-2xl border-2 border-dashed p-8 text-center" style={{borderColor:'#d4c4b0', background:'#fbf8f3'}}>
            <div style={{color:'#a8421f'}} className="inline-block mb-3"><Icon n={iconName} s={42} sw={1.2}/></div>

          </div>
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => cameraRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="camera" s={18}/> {T('Cámara','Camera')}</button>
            <button onClick={() => fileRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#3a2820', color:'#fbf8f3'}}><Icon n="upload" s={18}/> {T('Galería','Gallery')}</button>

          <input ref={cameraRef} type="file" accept="image/*" capture={cameraMode} onChange={handleFile} className="hidden"/>

      ) : (
        <div className="space-y-3">
          <div className="relative rounded-2xl overflow-hidden" style={{background:'#3a2820'}}>
            <img src={image} alt="" className="w-full max-h-96 object-contain"/>
            <button onClick={reset} className="absolute top-3 right-3 p-2 rounded-full backdrop-blur" style={{background:'rgba(58,40,32,0.85)', color:'#fbf8f3'}}><Icon n="x" s={16}/></button>
          </div>
          {!result && !loading && <button onClick={analyze} className="w-full py-4 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="sparkles" s={18}/> {T('Analizar','Analyze')}</button>}
        </div>
      )}
      {loading && <div className="flex flex-col items-center gap-3 py-10"><div style={{color:'#a8421f'}} className="spin"><Icon n="loader" s={28}/></div><p className="font-display italic" style={{color:'#7a5a4a'}}>{T('Analizando...','Analyzing...')}</p></div>}
      {error && <div className="p-4 rounded-xl text-sm" style={{background:'#fae8e0', color:'#8a2818'}}>{error}</div>}
      {result && (
        <div className="space-y-4">
          <div className="rounded-2xl p-5" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}><FormattedText text={result}/></div>

// ===== SCAN TAB WITH VIRTUAL TRY-ON =====
function ScanTab({ profile, refreshProfile }) {
  const [setupMode, setSetupMode] = useState(!profile);
  const [profileImage, setProfileImage] = useState(null);
  const [savingProfile, setSavingProfile] = useState(false);
  const [itemImage, setItemImage] = useState(null);
  const [itemData, setItemData] = useState(null);
  const [result, setResult] = useState('');
  const [verdict, setVerdict] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  // Virtual try-on
  const [tryonImage, setTryonImage] = useState(null);
  const [tryonLoading, setTryonLoading] = useState(false);
  const [tryonError, setTryonError] = useState('');
  
  const pFileRef = useRef(); const pCamRef = useRef();
  const iFileRef = useRef(); const iCamRef = useRef();

  useEffect(() => { setSetupMode(!profile); }, [profile]);

  const handleProfile = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setError(''); setSavingProfile(true);
    try {
      const resized = await resizeImage(f, 800, 0.8);
      setProfileImage(resized.dataUrl);
      await storage.set('profile:reference', JSON.stringify({ image: resized.dataUrl, savedAt: Date.now() }));
      await refreshProfile();
      setSetupMode(false);
    } catch (e) { setError(T('No pude guardar tu perfil.','I could not save your profile.')); }
    finally { setSavingProfile(false); }
  };

  const handleItem = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setError(''); setResult(''); setVerdict(null); setTryonImage(null);
    const resized = await resizeImage(f, 800, 0.8);
    setItemImage(resized.dataUrl); setItemData(resized);
  };

  const scanItem = async () => {
    if (!itemData || !profile) return;
    setLoading(true); setError('');
    try {
      const profileData = { data: profile.image.split(',')[1], mediaType: 'image/jpeg' };
      const r = await geminiText({ images: [profileData, itemData], prompt: SCAN_PROMPT });
      const m = r.match(/VEREDICTO:\s*(SÍ|SI|NO|DEPENDE)/i);
      const v = m ? m[1].toUpperCase().replace('SI', 'SÍ') : 'DEPENDE';
      const clean = r.replace(/VEREDICTO:\s*(SÍ|SI|NO|DEPENDE)[\n\s]*/i, '').trim();
      setVerdict(v); setResult(clean);
    } catch (e) { setError(errorMessage(e)); }
    finally { setLoading(false); }
  };

  const generateTryOn = async () => {
    if (!itemData || !profile) return;
    setTryonLoading(true); setTryonError('');
    try {
      const profileData = { data: profile.image.split(',')[1], mediaType: 'image/jpeg' };
      const img = await geminiTryOn({ personImage: profileData, garmentImage: itemData });
      setTryonImage(img);
    } catch (e) { setTryonError(errorMessage(e)); }
    finally { setTryonLoading(false); }
  };

  const downloadTryOn = () => {
    if (!tryonImage) return;
    const a = document.createElement('a');
    a.href = tryonImage.dataUrl;
    a.download = `probador-${Date.now()}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const resetScan = () => { setItemImage(null); setItemData(null); setResult(''); setVerdict(null); setError(''); setTryonImage(null); setTryonError(''); };

  const changeProfile = async () => {
    if (!confirm(T('¿Reemplazar tu foto de referencia?','Replace your reference photo?'))) return;
    await storage.delete('profile:reference');
    await refreshProfile();
    setSetupMode(true); resetScan();
  };

  const vStyle = (v) => {
    if (v === 'SÍ') return { bg: '#5a7556', text: '#fbf8f3', icon: 'check', label: T('SÍ TE QUEDA BIEN','YES, IT SUITS YOU') };
    if (v === 'NO') return { bg: '#a8421f', text: '#fbf8f3', icon: 'x', label: T('NO LA COMPRES',"DON'T BUY IT") };
    return { bg: '#c89e5a', text: '#3a2820', icon: 'alert', label: T('DEPENDE','IT DEPENDS') };
  };

  if (setupMode) {
    return (
      <div className="space-y-5">
        <div className="rounded-2xl p-5" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}>
          <div className="flex items-start gap-3 mb-4">
            <div className="p-2 rounded-xl" style={{background:'#f5ede0'}}><Icon n="usercheck" s={20} style={{color:'#a8421f'}}/></div>
            <div>
              <h3 className="font-display text-xl" style={{color:'#3a2820'}}>{T('Primero, una foto tuya','First, a photo of you')}</h3>
              <p className="text-sm mt-1" style={{color:'#7a5a4a'}}>{T('Cara y torso, sobre fondo liso a ser posible. Se usa también para el probador virtual.','Face and torso, on a plain background if possible. Also used for the virtual try-on.')}</p>
            </div>
          </div>
          {profileImage && <div className="relative rounded-xl overflow-hidden mb-3" style={{background:'#3a2820'}}><img src={profileImage} alt="" className="w-full max-h-72 object-contain"/></div>}
          {savingProfile ? (
            <div className="flex flex-col items-center gap-2 py-6"><div style={{color:'#a8421f'}} className="spin"><Icon n="loader" s={24}/></div><p className="text-sm" style={{color:'#7a5a4a'}}>{T('Guardando...','Saving...')}</p></div>
          ) : (
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => pCamRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="camera" s={18}/> {T('Cámara','Camera')}</button>
              <button onClick={() => pFileRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#3a2820', color:'#fbf8f3'}}><Icon n="upload" s={18}/> {T('Galería','Gallery')}</button>
            </div>
          )}
          <input ref={pCamRef} type="file" accept="image/*" capture="user" onChange={handleProfile} className="hidden"/>
          <input ref={pFileRef} type="file" accept="image/*" onChange={handleProfile} className="hidden"/>
        </div>
        {error && <div className="p-4 rounded-xl text-sm" style={{background:'#fae8e0', color:'#8a2818'}}>{error}</div>}
      </div>
    );
  }

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between p-3 rounded-xl" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}>
        <div className="flex items-center gap-3">
          <img src={profile.image} alt="tú" className="w-12 h-12 rounded-full object-cover"/>
          <div>
            <div className="text-xs uppercase tracking-widest" style={{color:'#7a5a4a'}}>{T('Referencia','Reference')}</div>
            <div className="text-sm font-medium" style={{color:'#3a2820'}}>{T('Tu foto guardada','Your saved photo')}</div>
          </div>
        </div>
        <button onClick={changeProfile} className="text-xs px-3 py-1.5 rounded-full font-medium" style={{background:'#f5ede0', color:'#7a5a4a'}}>{T('Cambiar','Change')}</button>
      </div>

      {!itemImage ? (
        <div className="space-y-3">
          <div className="rounded-2xl border-2 border-dashed p-8 text-center" style={{borderColor:'#d4c4b0', background:'#fbf8f3'}}>
            <div style={{color:'#a8421f'}} className="inline-block mb-3"><Icon n="scan" s={42} sw={1.2}/></div>
            <p className="font-display text-lg mb-1" style={{color:'#3a2820'}}>{T('Foto de la prenda','Photo of the garment')}</p>
            <p className="text-sm" style={{color:'#7a5a4a'}}>{T('En la tienda, sobre percha o desplegada','In the store, on a hanger or laid out')}</p>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => iCamRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="camera" s={18}/> {T('Cámara','Camera')}</button>
            <button onClick={() => iFileRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#3a2820', color:'#fbf8f3'}}><Icon n="upload" s={18}/> {T('Galería','Gallery')}</button>
          </div>
          <input ref={iCamRef} type="file" accept="image/*" capture="environment" onChange={handleItem} className="hidden"/>
          <input ref={iFileRef} type="file" accept="image/*" onChange={handleItem} className="hidden"/>
        </div>
      ) : (
        <div className="space-y-3">
          <div className="relative rounded-2xl overflow-hidden" style={{background:'#3a2820'}}>
            <img src={itemImage} alt="" className="w-full max-h-96 object-contain"/>
            <button onClick={resetScan} className="absolute top-3 right-3 p-2 rounded-full backdrop-blur" style={{background:'rgba(58,40,32,0.85)', color:'#fbf8f3'}}><Icon n="x" s={16}/></button>
          </div>
          {!result && !loading && <button onClick={scanItem} className="w-full py-4 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="scan" s={18}/> {T('¿Me queda bien?','Does it suit me?')}</button>}
        </div>
      )}

      {loading && <div className="flex flex-col items-center gap-3 py-10"><div style={{color:'#a8421f'}} className="spin"><Icon n="loader" s={28}/></div><p className="font-display italic" style={{color:'#7a5a4a'}}>{T('Comparando contigo...','Comparing with you...')}</p></div>}
      {error && <div className="p-4 rounded-xl text-sm" style={{background:'#fae8e0', color:'#8a2818'}}>{error}</div>}

      {result && verdict && (() => {
        const vs = vStyle(verdict);
        return (
          <div className="space-y-4">
            <div className="rounded-2xl p-6 text-center" style={{background: vs.bg, color: vs.text}}>
              <div className="inline-block mb-2"><Icon n={vs.icon} s={48} sw={2}/></div>
              <div className="font-display text-2xl tracking-tight">{vs.label}</div>
            </div>
            <div className="rounded-2xl p-5" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}><FormattedText text={result}/></div>

            {/* VIRTUAL TRY-ON */}
            {!tryonImage && !tryonLoading && (
              <button onClick={generateTryOn} className="w-full py-4 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'#3a2820', color:'#fbf8f3'}}>
                <Icon n="eye" s={18}/> {T('Verme con la prenda puesta','See me wearing it')}
              </button>
            )}
            {tryonLoading && (
              <div className="rounded-2xl p-8 flex flex-col items-center gap-3 pulse" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}>
                <div style={{color:'#a8421f'}} className="spin"><Icon n="loader" s={32}/></div>
                <p className="font-display italic" style={{color:'#7a5a4a'}}>{T('Generando imagen...','Generating image...')}</p>
                <p className="text-xs text-center" style={{color:'#b8a890'}}>{T('Puede tardar 10-20 segundos','It can take 10–20 seconds')}</p>
              </div>
            )}
            {tryonError && <div className="p-4 rounded-xl text-sm" style={{background:'#fae8e0', color:'#8a2818'}}>{tryonError}</div>}
            {tryonImage && (
              <div className="space-y-3">
                <div className="rounded-2xl overflow-hidden relative" style={{background:'#3a2820'}}>
                  <img src={tryonImage.dataUrl} alt="probador virtual" className="w-full"/>
                  <div className="absolute bottom-3 left-3 px-2.5 py-1 rounded-full text-[10px] font-medium" style={{background:'rgba(251,248,243,0.95)', color:'#3a2820'}}>
                    {T('Generado por IA · No es una foto real','AI-generated · Not a real photo')}
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={generateTryOn} className="py-3 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'#f5ede0', color:'#3a2820'}}>
                    <Icon n="rotate" s={16}/> {T('Otra versión','Another version')}
                  </button>
                  <button onClick={downloadTryOn} className="py-3 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'#3a2820', color:'#fbf8f3'}}>
                    <Icon n="download" s={16}/> {T('Guardar','Save')}
                  </button>
                </div>
              </div>
            )}

            <button onClick={resetScan} className="w-full py-3 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'transparent', color:'#3a2820', border:'1.5px solid #3a2820'}}>
              <Icon n="scan" s={16}/> {T('Escanear otra prenda','Scan another garment')}
            </button>
          </div>
        );
      })()}
    </div>
  );
}

const CATEGORIES = [
  { id: 'todos', label: T('Todo','All') },
  { id: 'camisa', label: T('Camisas','Shirts') },
  { id: 'polo', label: T('Polos','Polos') },
  { id: 'camiseta', label: T('Camisetas','T-shirts') },
  { id: 'jersey', label: T('Jerséis','Sweaters') },
  { id: 'chaqueta', label: T('Chaquetas','Jackets') },
  { id: 'pantalon', label: T('Pantalones','Trousers') },
  { id: 'zapatos', label: T('Zapatos','Shoes') },
  { id: 'accesorio', label: T('Accesorios','Accessories') },
  { id: 'otro', label: T('Otros','Other') },
];

function WardrobeTab({ items, refresh }) {
  const [adding, setAdding] = useState(false);
  const [analyzing, setAnalyzing] = useState(false);
  const [error, setError] = useState('');
  const [filter, setFilter] = useState('todos');
  const [confirmDelete, setConfirmDelete] = useState(null);
  const fileRef = useRef(); const cameraRef = useRef();

  const addItem = async (file) => {
    setAnalyzing(true); setError('');
    try {
      const resized = await resizeImage(file, 600, 0.7);
      const analysis = await geminiText({ images: [resized], prompt: CATEGORIZE_PROMPT, expectJson: true });
      const newItem = { id: Date.now().toString(), image: resized.dataUrl, ...analysis };
      await storage.set(`wardrobe:item:${newItem.id}`, JSON.stringify(newItem));
      let index = [];
      try { const existing = await storage.get('wardrobe:index'); if (existing) index = JSON.parse(existing.value); } catch (e) {}
      index.push(newItem.id);
      await storage.set('wardrobe:index', JSON.stringify(index));
      await refresh();
      setAdding(false);
    } catch (e) { setError(errorMessage(e)); }
    finally { setAnalyzing(false); }
  };

  const deleteItem = async (id) => {
    try {
      await storage.delete(`wardrobe:item:${id}`);
      const existing = await storage.get('wardrobe:index');
      if (existing) {
        const idx = JSON.parse(existing.value).filter(x => x !== id);
        await storage.set('wardrobe:index', JSON.stringify(idx));
      }
      await refresh();
      setConfirmDelete(null);
    } catch (e) { setError(T('No pude eliminar.',"Couldn't delete it.")); }
  };

  const filteredItems = filter === 'todos' ? items : items.filter(i => i.categoria === filter);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-[10px] uppercase tracking-widest" style={{color:'#7a5a4a'}}>{T('Mi armario','My closet')}</div>
          <div className="font-display text-2xl" style={{color:'#3a2820'}}>{items.length} {items.length === 1 ? T('prenda','item') : T('prendas','items')}</div>
        </div>
        <button onClick={() => setAdding(true)} className="px-4 py-2.5 rounded-full font-medium flex items-center gap-2 transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="plus" s={16}/> {T('Añadir','Add')}</button>
      </div>

      {items.length > 0 && (
        <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1 scrollbar-hide">
          {CATEGORIES.map(c => {
            const active = filter === c.id;
            const count = c.id === 'todos' ? items.length : items.filter(i => i.categoria === c.id).length;
            if (c.id !== 'todos' && count === 0) return null;
            return (
              <button key={c.id} onClick={() => setFilter(c.id)} className="px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition active:scale-95" style={{background: active ? '#3a2820' : '#fbf8f3', color: active ? '#fbf8f3' : '#7a5a4a', border: active ? 'none' : '1px solid #e8dcc8'}}>
                {c.label} {count > 0 && `· ${count}`}
              </button>
            );
          })}
        </div>
      )}

      {adding && (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4" style={{background:'rgba(58,40,32,0.6)'}} onClick={() => !analyzing && setAdding(false)}>
          <div className="w-full max-w-md rounded-2xl p-5 space-y-4" style={{background:'#fbf8f3'}} onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between">
              <h3 className="font-display text-xl" style={{color:'#3a2820'}}>{T('Añadir prenda','Add a garment')}</h3>
              {!analyzing && <button onClick={() => setAdding(false)}><Icon n="x" s={18} style={{color:'#7a5a4a'}}/></button>}
            </div>
            {analyzing ? (
              <div className="flex flex-col items-center gap-3 py-10"><div style={{color:'#a8421f'}} className="spin"><Icon n="loader" s={28}/></div><p className="font-display italic" style={{color:'#7a5a4a'}}>{T('Identificando prenda...','Identifying garment...')}</p></div>
            ) : (
              <>
                <p className="text-sm" style={{color:'#7a5a4a'}}>{T('Foto clara sobre fondo liso.','A clear photo on a plain background.')}</p>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => cameraRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="camera" s={18}/> {T('Cámara','Camera')}</button>
                  <button onClick={() => fileRef.current?.click()} className="flex items-center justify-center gap-2 py-3.5 rounded-xl font-medium transition active:scale-95" style={{background:'#3a2820', color:'#fbf8f3'}}><Icon n="upload" s={18}/> {T('Galería','Gallery')}</button>
                </div>
              </>
            )}
            <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={e => e.target.files?.[0] && addItem(e.target.files[0])} className="hidden"/>
            <input ref={fileRef} type="file" accept="image/*" onChange={e => e.target.files?.[0] && addItem(e.target.files[0])} className="hidden"/>
          </div>
        </div>
      )}

      {confirmDelete && (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4" style={{background:'rgba(58,40,32,0.6)'}} onClick={() => setConfirmDelete(null)}>
          <div className="w-full max-w-md rounded-2xl p-5 space-y-4" style={{background:'#fbf8f3'}} onClick={e => e.stopPropagation()}>
            <h3 className="font-display text-xl" style={{color:'#3a2820'}}>{T('¿Eliminar prenda?','Delete this garment?')}</h3>
            <div className="flex items-center gap-3 p-3 rounded-xl" style={{background:'#f5ede0'}}>
              <img src={confirmDelete.image} alt="" className="w-16 h-16 rounded-lg object-cover"/>
              <div className="flex-1">
                <div className="font-medium" style={{color:'#3a2820'}}>{confirmDelete.nombre}</div>
                <div className="text-sm" style={{color:'#7a5a4a'}}>{confirmDelete.color}</div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => setConfirmDelete(null)} className="py-3 rounded-xl font-medium" style={{background:'#f5ede0', color:'#3a2820'}}>{T('Cancelar','Cancel')}</button>
              <button onClick={() => deleteItem(confirmDelete.id)} className="py-3 rounded-xl font-medium" style={{background:'#a8421f', color:'#fbf8f3'}}>{T('Eliminar','Delete')}</button>
            </div>
          </div>
        </div>
      )}

      {error && <div className="p-4 rounded-xl text-sm" style={{background:'#fae8e0', color:'#8a2818'}}>{error}</div>}

      {items.length === 0 ? (
        <div className="rounded-2xl border-2 border-dashed p-10 text-center" style={{borderColor:'#d4c4b0', background:'#fbf8f3'}}>
          <div style={{color:'#a8421f'}} className="inline-block mb-3"><Icon n="archive" s={42} sw={1.2}/></div>
          <p className="font-display text-lg mb-2" style={{color:'#3a2820'}}>{T('Tu armario está vacío','Your closet is empty')}</p>
          <p className="text-sm" style={{color:'#7a5a4a'}}>{T('Añade tus prendas para que "Hoy" combine con lo tuyo.','Add your garments so "Today" can match with what you own.')}</p>
        </div>
      ) : filteredItems.length === 0 ? (
        <div className="rounded-2xl p-8 text-center" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}><p className="text-sm" style={{color:'#7a5a4a'}}>{T('No hay prendas en esta categoría.','No items in this category.')}</p></div>
      ) : (
        <div className="grid grid-cols-2 gap-3">
          {filteredItems.map(item => (
            <div key={item.id} className="rounded-2xl overflow-hidden" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}>
              <div className="relative aspect-square" style={{background:'#f5ede0'}}>
                <img src={item.image} alt={item.nombre} className="w-full h-full object-cover"/>
                <button onClick={() => setConfirmDelete(item)} className="absolute top-2 right-2 p-1.5 rounded-full backdrop-blur" style={{background:'rgba(58,40,32,0.75)', color:'#fbf8f3'}}><Icon n="trash" s={12}/></button>
              </div>
              <div className="p-3">
                <div className="font-medium text-sm leading-tight" style={{color:'#3a2820'}}>{item.nombre}</div>
                <div className="text-xs mt-0.5" style={{color:'#7a5a4a'}}>{item.color} · {item.material}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ===== DAILY =====
function DailyTab({ wardrobeItems }) {
  const [weather, setWeather] = useState('soleado');
  const [temp, setTemp] = useState(22);
  const [occasion, setOccasion] = useState('paseo');
  const [notes, setNotes] = useState('');
  const [useWardrobe, setUseWardrobe] = useState(false);
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const weatherOptions = [
    { id: 'soleado', label: T('Soleado','Sunny'), icon: 'sun' },
    { id: 'parcial', label: T('Parcial','Partly'), icon: 'cloudsun' },
    { id: 'nublado', label: T('Nublado','Cloudy'), icon: 'cloud' },
    { id: 'lluvioso', label: T('Lluvia','Rain'), icon: 'cloudrain' },
    { id: 'ventoso', label: T('Viento','Wind'), icon: 'wind' },
  ];
  const occasions = ['paseo', 'café', 'almuerzo', 'cena', 'médico', 'reunión', 'viaje', 'casa', 'evento'];
  const occasionLabels = { paseo: T('paseo','walk'), 'café': T('café','coffee'), almuerzo: T('almuerzo','lunch'), cena: T('cena','dinner'), 'médico': T('médico','doctor'), 'reunión': T('reunión','meeting'), viaje: T('viaje','trip'), casa: T('casa','home'), evento: T('evento','event') };

  const generate = async () => {
    setLoading(true); setError(''); setResult('');
    try {
      const r = await geminiText({ prompt: buildDailyPrompt({ weather, temp, occasion, notes, wardrobe: useWardrobe ? wardrobeItems : null }) });
      setResult(r);
    } catch (e) { setError(errorMessage(e)); }
    finally { setLoading(false); }
  };

  return (
    <div className="space-y-5">
      <div className="rounded-2xl p-5 space-y-5" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}>
        {wardrobeItems.length > 0 && (
          <div className="flex items-center justify-between p-3 rounded-xl" style={{background: useWardrobe ? '#3a2820' : '#f5ede0'}}>
            <div className="flex-1">
              <div className="text-sm font-medium" style={{color: useWardrobe ? '#fbf8f3' : '#3a2820'}}>{T('Vestirme con mi armario','Dress from my closet')}</div>
              <div className="text-xs mt-0.5" style={{color: useWardrobe ? '#d4c4b0' : '#7a5a4a'}}>{useWardrobe ? T(`Combinando ${wardrobeItems.length} prendas tuyas`, `Combining ${wardrobeItems.length} of your garments`) : T('Recomendación libre','Free recommendation')}</div>
            </div>
            <button onClick={() => setUseWardrobe(!useWardrobe)} className="relative w-12 h-7 rounded-full transition" style={{background: useWardrobe ? '#a8421f' : '#d4c4b0'}}>
              <div className="absolute top-1 w-5 h-5 rounded-full transition-all" style={{background:'#fbf8f3', left: useWardrobe ? '24px' : '4px'}}/>
            </button>
          </div>
        )}
        <div>
          <label className="text-xs uppercase tracking-widest font-medium block mb-3" style={{color:'#7a5a4a'}}>{T('Clima','Weather')}</label>
          <div className="grid grid-cols-5 gap-2">
            {weatherOptions.map(w => {
              const active = weather === w.id;
              return (
                <button key={w.id} onClick={() => setWeather(w.id)} className="flex flex-col items-center gap-1 py-3 rounded-xl transition active:scale-95" style={{background: active ? '#a8421f' : '#f5ede0', color: active ? '#fbf8f3' : '#7a5a4a'}}>
                  <Icon n={w.icon} s={20} sw={1.5}/><span className="text-[10px] leading-tight">{w.label}</span>
                </button>
              );
            })}
          </div>
        </div>
        <div>
          <div className="flex justify-between items-baseline mb-2">
            <label className="text-xs uppercase tracking-widest font-medium" style={{color:'#7a5a4a'}}>{T('Temperatura','Temperature')}</label>
            <span className="font-display text-2xl" style={{color:'#a8421f'}}>{temp}°C</span>
          </div>
          <input type="range" min="5" max="40" value={temp} onChange={e => setTemp(Number(e.target.value))} className="w-full"/>
        </div>
        <div>
          <label className="text-xs uppercase tracking-widest font-medium block mb-3" style={{color:'#7a5a4a'}}>{T('Ocasión','Occasion')}</label>
          <div className="flex flex-wrap gap-2">
            {occasions.map(o => {
              const active = occasion === o;
              return <button key={o} onClick={() => setOccasion(o)} className="px-3.5 py-2 rounded-full text-sm font-medium transition active:scale-95" style={{background: active ? '#3a2820' : '#f5ede0', color: active ? '#fbf8f3' : '#7a5a4a'}}>{occasionLabels[o] || o}</button>;
            })}
          </div>
        </div>
        <div>
          <label className="text-xs uppercase tracking-widest font-medium block mb-2" style={{color:'#7a5a4a'}}>{T('Notas opcionales','Optional notes')}</label>
          <input type="text" value={notes} onChange={e => setNotes(e.target.value)} placeholder={T('ej: voy a estar de pie','e.g.: I will be standing')} className="w-full px-4 py-3 rounded-xl text-sm" style={{background:'#f5ede0', border:'1px solid #e8dcc8', color:'#3a2820'}}/>
        </div>
      </div>
      {!result && !loading && <button onClick={generate} className="w-full py-4 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'#a8421f', color:'#fbf8f3'}}><Icon n="sparkles" s={18}/> {T('Recomiéndame outfit','Recommend an outfit')}</button>}
      {loading && <div className="flex flex-col items-center gap-3 py-10"><div style={{color:'#a8421f'}} className="spin"><Icon n="loader" s={28}/></div><p className="font-display italic" style={{color:'#7a5a4a'}}>{T('Pensando tu look...','Thinking up your look...')}</p></div>}
      {error && <div className="p-4 rounded-xl text-sm" style={{background:'#fae8e0', color:'#8a2818'}}>{error}</div>}
      {result && (
        <div className="space-y-4">
          <div className="rounded-2xl p-5" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}><FormattedText text={result}/></div>
          {!useWardrobe && <ShoppingButton resultText={result}/>}
          <button onClick={generate} className="w-full py-3 rounded-xl font-medium flex items-center justify-center gap-2 transition active:scale-95" style={{background:'transparent', color:'#3a2820', border:'1.5px solid #3a2820'}}><Icon n="rotate" s={16}/> {T('Otra recomendación','Another recommendation')}</button>
        </div>
      )}
    </div>
  );
}

// ===== ROOT =====
function App() {
  const [hasKey, setHasKey] = useState(!!getApiKey());
  const [tab, setTab] = useState('rostro');
  const [wardrobeItems, setWardrobeItems] = useState([]);
  const [profile, setProfile] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);

  const loadAll = async () => {
    try {
      const indexResult = await storage.get('wardrobe:index');
      if (indexResult) {
        const ids = JSON.parse(indexResult.value);
        const items = [];
        for (const id of ids) { try { const r = await storage.get(`wardrobe:item:${id}`); if (r) items.push(JSON.parse(r.value)); } catch (e) {} }
        setWardrobeItems(items);
      }
    } catch (e) {}
    try { const p = await storage.get('profile:reference'); if (p) setProfile(JSON.parse(p.value)); else setProfile(null); } catch (e) { setProfile(null); }
  };

  const refreshProfile = async () => {
    try { const p = await storage.get('profile:reference'); if (p) setProfile(JSON.parse(p.value)); else setProfile(null); } catch (e) { setProfile(null); }
  };

  useEffect(() => { if (hasKey) loadAll(); }, [hasKey]);

  if (!hasKey) return <Onboarding onDone={() => setHasKey(true)}/>;

  const tabs = [
    { id: 'rostro', label: T('Rostro','Face'), icon: 'user' },
    { id: 'estilo', label: T('Estilo','Style'), icon: 'shirt' },
    { id: 'probar', label: T('Probar','Try on'), icon: 'scan' },
    { id: 'armario', label: T('Armario','Closet'), icon: 'archive' },
    { id: 'hoy', label: T('Hoy','Today'), icon: 'sparkles' },
  ];

  return (
    <div className="min-h-screen" style={{background:'#f5ede0', backgroundImage:`radial-gradient(at 10% 10%, #fbf8f3 0%, transparent 50%), radial-gradient(at 90% 90%, #ead8c0 0%, transparent 50%)`}}>
      <div className="max-w-2xl mx-auto px-5 py-6 pb-24">
        <header className="text-center mb-6 relative">
          <button onClick={switchLang} className="absolute left-0 top-0 px-2.5 py-1.5 rounded-full text-xs font-semibold" style={{background:'#fbf8f3', border:'1px solid #e8dcc8', color:'#7a5a4a'}}>{LANG === 'es' ? 'EN' : 'ES'}</button>
          <button onClick={() => setSettingsOpen(true)} className="absolute right-0 top-0 p-2 rounded-full" style={{color:'#7a5a4a'}}><Icon n="settings" s={18}/></button>
          <div className="text-[10px] uppercase tracking-[0.3em] mb-1" style={{color:'#7a5a4a'}}>{T('· Estilo personal ·','· Personal style ·')}</div>
          <h1 className="font-display text-4xl leading-none tracking-tight" style={{color:'#3a2820'}}>El <em style={{color:'#a8421f'}}>Asesor</em></h1>
          <div className="mt-2 text-xs italic" style={{color:'#7a5a4a', fontFamily:'Fraunces, serif'}}>{T('analiza, prueba, viste','analyze, try on, dress')}</div>
        </header>

        <nav className="flex gap-1 p-1 rounded-2xl mb-6" style={{background:'#fbf8f3', border:'1px solid #e8dcc8'}}>
          {tabs.map(t => {
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={() => setTab(t.id)} className="flex-1 flex flex-col items-center justify-center gap-1 py-2 px-1 rounded-xl text-[10px] font-medium transition" style={{background: active ? '#3a2820' : 'transparent', color: active ? '#fbf8f3' : '#7a5a4a'}}>
                <Icon n={t.icon} s={16} sw={1.8}/>{t.label}
              </button>
            );
          })}
        </nav>

        <main>
          {tab === 'rostro' && <PhotoTab promptText={FACE_PROMPT} iconName="user" placeholder={T('Foto frontal de tu rostro con buena luz','A front photo of your face in good light')} cameraMode="user"/>}
          {tab === 'estilo' && <PhotoTab promptText={STYLE_PROMPT} iconName="shirt" placeholder={T('Foto de cuerpo entero con tu outfit','A full-body photo of your outfit')} cameraMode="environment"/>}
          {tab === 'probar' && <ScanTab profile={profile} refreshProfile={refreshProfile}/>}
          {tab === 'armario' && <WardrobeTab items={wardrobeItems} refresh={loadAll}/>}
          {tab === 'hoy' && <DailyTab wardrobeItems={wardrobeItems}/>}
        </main>

        {settingsOpen && (
          <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4" style={{background:'rgba(58,40,32,0.6)'}} onClick={() => setSettingsOpen(false)}>
            <div className="w-full max-w-md rounded-2xl p-5 space-y-4" style={{background:'#fbf8f3'}} onClick={e => e.stopPropagation()}>
              <div className="flex items-center justify-between">
                <h3 className="font-display text-xl" style={{color:'#3a2820'}}>{T('Ajustes','Settings')}</h3>
                <button onClick={() => setSettingsOpen(false)}><Icon n="x" s={18} style={{color:'#7a5a4a'}}/></button>
              </div>
              <button onClick={() => { if (confirm(T('¿Cambiar tu API key?','Change your API key?'))) { localStorage.removeItem('apikey'); localStorage.removeItem('gemini_api_key'); setHasKey(false); setSettingsOpen(false); }}} className="w-full py-3 rounded-xl font-medium flex items-center justify-center gap-2" style={{background:'#f5ede0', color:'#3a2820'}}><Icon n="key" s={16}/> {T('Cambiar API key','Change API key')}</button>
              <button onClick={() => { if (confirm(T('¿Borrar tu foto de referencia y tu armario? (No afecta a las otras apps)','Delete your reference photo and closet? (Other apps are not affected)'))) { Object.keys(localStorage).forEach(k => { if (k.startsWith('wardrobe:') || k === 'profile:reference') localStorage.removeItem(k); }); location.reload(); }}} className="w-full py-3 rounded-xl font-medium flex items-center justify-center gap-2" style={{background:'#fae8e0', color:'#a8421f'}}><Icon n="trash" s={16}/> {T('Borrar datos del Asesor','Delete Advisor data')}</button>
              <p className="text-xs text-center" style={{color:'#7a5a4a'}}>{T('Todos los datos se guardan solo en tu móvil','All data is stored only on your phone')}</p>
            </div>
          </div>
        )}

        <footer className="text-center mt-12">
          <div className="text-[10px] uppercase tracking-[0.3em]" style={{color:'#b8a890'}}>· {T('con','with')} Gemini ·</div>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
}
</script>
</body>
</html>
